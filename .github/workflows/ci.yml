name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm audit --omit=dev --audit-level=high
      - name: Parse Actor JSON files
        run: node -e "for (const file of ['INPUT_SCHEMA.json','.actor/actor.json','.actor/output_schema.json','.actor/dataset_schema.json','input.json']) JSON.parse(require('fs').readFileSync(file,'utf8'))"
